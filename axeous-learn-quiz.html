<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Axeous Learn — Study Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Reset ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #05060a;
  --surface:     rgba(255,255,255,0.04);
  --surface-2:   rgba(255,255,255,0.07);
  --surface-3:   rgba(255,255,255,0.10);
  --line:        rgba(255,255,255,0.07);
  --line-strong: rgba(255,255,255,0.13);
  --ink:         #f0f2f6;
  --ink-dim:     rgba(240,242,246,0.55);
  --ink-faint:   rgba(240,242,246,0.28);
  --teal:        #6e9cc7;
  --coral:       #ff4858;
  --violet:      #a78bfa;
  --blue:        #6aa8ff;
  --r-sm:        6px;
  --r-md:        10px;
  --r-lg:        12px;
  --r-card:      16px;
  --r-pill:      999px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
  font-size: 16px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
  overflow-x: hidden;
}
body.locked { overflow: hidden; }

/* ── Atmosphere ─────────────────────────────────── */
.backdrop {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(900px 600px at 15% -5%,  rgba(110,156,199,0.12), transparent 60%),
    radial-gradient(700px 500px at 85%  5%,  rgba(255,72,88,0.07),   transparent 60%),
    radial-gradient(1000px 700px at 50% 100%, rgba(106,168,255,0.07), transparent 65%),
    linear-gradient(180deg, #05060a 0%, #070810 50%, #04050a 100%);
  transition: background 0.6s ease;
}
.backdrop.state-correct {
  background:
    radial-gradient(900px 600px at 50% 30%, rgba(110,156,199,0.18), transparent 60%),
    radial-gradient(500px 400px at 80% 80%, rgba(110,156,199,0.08), transparent 60%),
    linear-gradient(180deg, #05060a 0%, #06090f 100%);
}
.backdrop.state-incorrect {
  background:
    radial-gradient(900px 600px at 50% 30%, rgba(255,72,88,0.13), transparent 60%),
    radial-gradient(400px 300px at 20% 80%,  rgba(255,72,88,0.06), transparent 60%),
    linear-gradient(180deg, #05060a 0%, #0a0607 100%);
}
.grid-lines {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.22;
  background-image:
    linear-gradient(to right,  rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, #000 30%, transparent 100%);
}

/* ── Shell ──────────────────────────────────────── */
.session-shell {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  max-width: 540px; margin: 0 auto;
  padding: 0 20px 40px;
}

/* ── HUD top ────────────────────────────────────── */
.hud {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 0 12px;
  flex-shrink: 0;
}
.hud-btn {
  width: 34px; height: 34px; border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-faint); font-size: 15px;
  transition: background .15s, color .15s, border-color .15s;
  flex-shrink: 0; user-select: none; -webkit-tap-highlight-color: transparent;
}
.hud-btn:hover { background: var(--surface-2); color: var(--ink-dim); border-color: var(--line-strong); }
.hud-btn:active { transform: scale(0.93); }

.hud-progress { flex: 1; }
.progress-track {
  height: 5px; background: rgba(255,255,255,0.06);
  border-radius: var(--r-pill); overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: var(--r-pill);
  background: var(--teal);
  box-shadow: 0 0 10px rgba(110,156,199,0.45);
  transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: width;
}
.progress-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 5px;
}
.progress-label {
  font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
  color: var(--ink-faint); letter-spacing: 0.04em;
}

.hud-chips { display: flex; gap: 6px; flex-shrink: 0; }
.hud-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 9px; border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line);
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  color: var(--ink-dim); white-space: nowrap;
  transition: color .2s, border-color .2s;
}
.hud-chip.streak-chip { color: var(--teal); border-color: rgba(110,156,199,0.2); }
.hud-chip.streak-chip .chip-dot { background: var(--teal); box-shadow: 0 0 5px rgba(110,156,199,0.7); }
.chip-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-faint); flex-shrink: 0; }

/* ── Timer bar ──────────────────────────────────── */
.timer-bar-wrap {
  margin-bottom: 16px;
}
.timer-bar-track {
  height: 2px; background: rgba(255,255,255,0.05); border-radius: var(--r-pill); overflow: hidden;
}
.timer-bar-fill {
  height: 100%; border-radius: var(--r-pill);
  background: var(--teal);
  transition: width 1s linear, background 0.3s;
  will-change: width;
}
.timer-bar-fill.warn { background: var(--coral); box-shadow: 0 0 6px rgba(255,72,88,0.5); }
.timer-label-row {
  display: flex; justify-content: flex-end; margin-top: 4px;
}
.timer-label {
  font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
  color: var(--ink-faint);
  transition: color .3s;
}
.timer-label.warn { color: var(--coral); }

/* ── Question zone ──────────────────────────────── */
.question-zone {
  display: flex; flex-direction: column; gap: 12px;
}

.topic-eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px 3px 6px; border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line);
  font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
  color: var(--ink-faint); letter-spacing: 0.05em;
  align-self: flex-start;
}
.topic-eyebrow-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--teal); box-shadow: 0 0 6px rgba(110,156,199,0.7);
}

/* ── Question card ──────────────────────────────── */
.q-card {
  background: rgba(255,255,255,0.032);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-card);
  padding: 28px;
  backdrop-filter: blur(20px);
  position: relative; overflow: hidden;
}
.q-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(600px 260px at 75% -10%, rgba(110,156,199,0.08), transparent 60%);
}
.q-card > * { position: relative; }
.q-stem {
  font-size: 17px; font-weight: 500; line-height: 1.65;
  letter-spacing: -0.02em; color: var(--ink);
}

/* ── Answer cards ───────────────────────────────── */
.answers { display: flex; flex-direction: column; gap: 9px; }

.a-card {
  position: relative;
  background: rgba(255,255,255,0.03);
  border: 1.5px solid var(--line);
  border-radius: var(--r-card);
  padding: 15px 18px;
  cursor: pointer;
  display: flex; align-items: center; gap: 13px;
  backdrop-filter: blur(14px);
  transition:
    border-color 0.18s ease,
    background 0.18s ease,
    transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
    box-shadow 0.18s ease,
    opacity 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  will-change: transform;
  overflow: hidden;
}

/* Staggered entrance */
.a-card { animation: a-enter 0.38s cubic-bezier(0.34,1.56,0.64,1) both; }
.a-card:nth-child(1) { animation-delay: 0.04s; }
.a-card:nth-child(2) { animation-delay: 0.09s; }
.a-card:nth-child(3) { animation-delay: 0.14s; }
.a-card:nth-child(4) { animation-delay: 0.19s; }
@keyframes a-enter {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Shimmer overlay on hover */
.a-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(106,168,255,0.06) 0%, transparent 70%);
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  border-radius: inherit;
}

/* States */
.a-card:hover:not(.locked) {
  border-color: rgba(106,168,255,0.38);
  background: rgba(106,168,255,0.05);
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(106,168,255,0.09);
}
.a-card:hover:not(.locked)::after { opacity: 1; }
.a-card:active:not(.locked) { transform: scale(0.975); }

.a-card.selected {
  border-color: rgba(106,168,255,0.55);
  background: rgba(106,168,255,0.07);
  box-shadow: 0 0 0 1px rgba(106,168,255,0.2) inset;
  transform: translateY(-1px);
}

.a-card.correct {
  border-color: rgba(110,156,199,0.65);
  background: rgba(110,156,199,0.09);
  box-shadow: 0 0 30px rgba(110,156,199,0.15), 0 0 0 1px rgba(110,156,199,0.3) inset;
  animation: correct-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes correct-pop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.025); }
  100% { transform: scale(1); }
}

.a-card.incorrect {
  border-color: rgba(255,72,88,0.45);
  background: rgba(255,72,88,0.07);
  animation: shake 0.42s ease forwards;
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-5px); }
  40%     { transform: translateX(5px); }
  60%     { transform: translateX(-3px); }
  80%     { transform: translateX(3px); }
}

.a-card.dimmed { opacity: 0.3; pointer-events: none; }
.a-card.locked { cursor: default; }

/* Letter badge */
.a-letter {
  width: 30px; height: 30px; border-radius: var(--r-md);
  background: var(--surface-2); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
  color: var(--ink-faint); flex-shrink: 0;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
.a-card.selected  .a-letter { background: rgba(106,168,255,0.18); border-color: rgba(106,168,255,0.45); color: var(--blue); }
.a-card.correct   .a-letter { background: rgba(110,156,199,0.18); border-color: rgba(110,156,199,0.55); color: var(--teal); }
.a-card.incorrect .a-letter { background: rgba(255,72,88,0.18);   border-color: rgba(255,72,88,0.45);   color: var(--coral); }

.a-text {
  font-size: 14.5px; line-height: 1.55; color: var(--ink-dim); flex: 1;
  transition: color 0.18s;
}
.a-card.selected  .a-text { color: var(--ink); }
.a-card.correct   .a-text { color: var(--ink); }
.a-card.incorrect .a-text { color: var(--ink); }

.a-icon {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; flex-shrink: 0;
  opacity: 0; transform: scale(0) rotate(-30deg);
  transition: opacity 0.22s, transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.a-card.correct   .a-icon { opacity: 1; transform: scale(1) rotate(0); background: rgba(110,156,199,0.18); color: var(--teal); }
.a-card.incorrect .a-icon { opacity: 1; transform: scale(1) rotate(0); background: rgba(255,72,88,0.18);   color: var(--coral); }

/* ── Feedback panel ─────────────────────────────── */
.feedback-panel {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--line);
  border-radius: var(--r-card);
  padding: 20px 22px;
  backdrop-filter: blur(16px);
  display: flex; flex-direction: column; gap: 12px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.3s ease, transform 0.32s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.feedback-panel.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.feedback-panel.correct-panel { border-color: rgba(110,156,199,0.2); }
.feedback-panel.incorrect-panel { border-color: rgba(255,72,88,0.18); }

.fb-header { display: flex; align-items: center; gap: 10px; }
.fb-icon {
  width: 34px; height: 34px; border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.fb-icon.correct   { background: rgba(110,156,199,0.15); color: var(--teal); }
.fb-icon.incorrect { background: rgba(255,72,88,0.12);   color: var(--coral); }
.fb-title {
  font-size: 15px; font-weight: 500; letter-spacing: -0.01em;
}
.fb-title.correct   { color: var(--teal); }
.fb-title.incorrect { color: var(--coral); }
.fb-xp {
  margin-left: auto; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--teal); padding: 3px 8px; border-radius: var(--r-pill);
  background: rgba(110,156,199,0.1); border: 1px solid rgba(110,156,199,0.2);
  opacity: 0; transform: translateX(8px);
  transition: opacity 0.3s 0.2s, transform 0.3s 0.2s;
}
.feedback-panel.visible .fb-xp { opacity: 1; transform: translateX(0); }

.fb-explanation {
  font-size: 13.5px; color: var(--ink-dim); line-height: 1.65;
}
.fb-correct-answer {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 14px; margin-top: 4px;
  background: rgba(110,156,199,0.07); border: 1px solid rgba(110,156,199,0.15);
  border-radius: var(--r-lg);
  font-size: 13px; color: var(--ink-dim); line-height: 1.55;
}
.fb-correct-label {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em;
  white-space: nowrap; padding-top: 1px;
}

/* AI Tutor button */
.btn-ai {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: var(--r-lg);
  background: rgba(167,139,250,0.07); border: 1px solid rgba(167,139,250,0.18);
  color: var(--violet); font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; width: fit-content;
  transition: background .18s, border-color .18s, transform .15s;
}
.btn-ai:hover { background: rgba(167,139,250,0.13); border-color: rgba(167,139,250,0.3); transform: translateY(-1px); }
.btn-ai:active { transform: scale(0.97); }
.ai-spark { font-size: 14px; }

/* ── Continue button ────────────────────────────── */
.continue-wrap {
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.continue-wrap.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

.btn-continue {
  width: 100%; padding: 15px 24px;
  border-radius: var(--r-card); border: none;
  font-size: 15px; font-weight: 500; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-continue:active { transform: scale(0.97); }
.btn-continue.is-correct {
  background: var(--teal); color: #05060a;
  box-shadow: 0 6px 28px rgba(110,156,199,0.22);
}
.btn-continue.is-correct:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(110,156,199,0.3); }
.btn-continue.is-incorrect {
  background: rgba(255,72,88,0.1); color: var(--coral);
  border: 1.5px solid rgba(255,72,88,0.28);
}
.btn-continue.is-incorrect:hover { background: rgba(255,72,88,0.16); transform: translateY(-1px); }

/* ── XP floater ─────────────────────────────────── */
.xp-floater {
  position: fixed; z-index: 200; pointer-events: none;
  top: 40%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(110,156,199,0.12); border: 1px solid rgba(110,156,199,0.28);
  border-radius: var(--r-card);
  padding: 11px 22px;
  font-size: 20px; font-weight: 500; color: var(--teal);
  font-family: 'JetBrains Mono', monospace;
  opacity: 0;
}
.xp-floater.pop { animation: xp-anim 1.1s cubic-bezier(0.34,1.56,0.64,1) forwards; }
@keyframes xp-anim {
  0%  { transform: translate(-50%, -50%) scale(0);   opacity: 0; }
  22% { transform: translate(-50%, -50%) scale(1.08); opacity: 1; }
  55% { transform: translate(-50%, -50%) scale(1);   opacity: 1; }
  100%{ transform: translate(-50%, -80%) scale(0.88); opacity: 0; }
}

/* ── Streak toast ───────────────────────────────── */
.streak-toast {
  position: fixed; z-index: 201; pointer-events: none;
  top: 72px; left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: rgba(110,156,199,0.1); border: 1px solid rgba(110,156,199,0.25);
  border-radius: var(--r-pill); padding: 7px 16px;
  font-size: 12.5px; color: var(--teal); font-weight: 500;
  display: flex; align-items: center; gap: 7px;
  opacity: 0; white-space: nowrap;
  transition: opacity 0.28s, transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.streak-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Keyboard hint ──────────────────────────────── */
.keyboard-hint {
  text-align: center; margin-top: 6px;
  font-size: 10.5px; color: var(--ink-faint);
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
}
.key-badge {
  display: inline-block; padding: 1px 5px;
  background: var(--surface-2); border: 1px solid var(--line-strong);
  border-radius: 4px; font-size: 9.5px; color: var(--ink-faint);
  margin: 0 2px;
}
@media (hover: none) { .keyboard-hint { display: none; } }

/* ════════════════════════════════════════════════
   AI TUTOR PANEL
════════════════════════════════════════════════ */
.tutor-scrim {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(5,6,10,0.72); backdrop-filter: blur(8px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.tutor-scrim.open { opacity: 1; pointer-events: all; }

.tutor-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
  max-width: 580px; margin: 0 auto;
  background: rgba(9,10,18,0.97);
  border: 1px solid var(--line-strong); border-bottom: none;
  border-radius: 20px 20px 0 0;
  padding: 28px 24px 44px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  overflow-y: auto; max-height: 80vh;
}
.tutor-panel.open { transform: translateY(0); }

.tutor-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--line-strong); margin: 0 auto 24px;
}
.tutor-hdr {
  display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
}
.tutor-avatar {
  width: 38px; height: 38px; border-radius: var(--r-lg);
  background: linear-gradient(135deg, rgba(106,168,255,0.12), rgba(167,139,250,0.18));
  border: 1px solid rgba(167,139,250,0.22);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.tutor-name { font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.2; }
.tutor-tag {
  font-size: 10px; font-family: 'JetBrains Mono', monospace;
  color: var(--violet); letter-spacing: 0.07em; margin-top: 2px;
}
.tutor-close {
  margin-left: auto; width: 30px; height: 30px; border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-faint); font-size: 14px;
  transition: background .15s;
}
.tutor-close:hover { background: var(--surface-2); color: var(--ink-dim); }

.tutor-section { margin-bottom: 20px; }
.tutor-section-lbl {
  font-size: 10px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--ink-faint); font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 7px;
}
.tutor-section-lbl::before {
  content: ''; width: 4px; height: 4px; border-radius: 50%;
  background: var(--violet); box-shadow: 0 0 5px var(--violet); flex-shrink: 0;
}
.tutor-section-body {
  font-size: 14px; color: var(--ink-dim); line-height: 1.7;
}
.tutor-tip {
  background: rgba(167,139,250,0.06); border: 1px solid rgba(167,139,250,0.14);
  border-radius: var(--r-lg); padding: 13px 16px;
  font-size: 13.5px; color: var(--ink-dim); line-height: 1.65;
}

/* ════════════════════════════════════════════════
   SESSION COMPLETE
════════════════════════════════════════════════ */
.complete-screen {
  position: fixed; inset: 0; z-index: 400;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 24px; text-align: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.45s;
}
.complete-screen.visible { opacity: 1; pointer-events: all; }

.complete-glow {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(600px 400px at 50% 25%, rgba(110,156,199,0.13), transparent 60%),
    radial-gradient(400px 300px at 80% 75%, rgba(167,139,250,0.07), transparent 60%);
}

.complete-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(110,156,199,0.1); border: 1px solid rgba(110,156,199,0.22);
  display: flex; align-items: center; justify-content: center; font-size: 36px;
  margin-bottom: 22px; position: relative;
  animation: icon-bloom 0.7s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes icon-bloom { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.complete-icon::after {
  content: ''; position: absolute; inset: -10px; border-radius: 50%;
  border: 1px solid rgba(110,156,199,0.12);
  animation: ring-breathe 2.5s ease-in-out infinite;
}
@keyframes ring-breathe {
  0%,100% { transform: scale(1); opacity: 0.7; }
  50%      { transform: scale(1.1); opacity: 0; }
}

.complete-label {
  font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
  color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 10px;
}
.complete-title {
  font-size: 28px; font-weight: 500; letter-spacing: -0.035em;
  color: var(--ink); margin-bottom: 8px;
}
.complete-sub {
  font-size: 14.5px; color: var(--ink-dim); margin-bottom: 32px; line-height: 1.5;
}

.complete-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  width: 100%; max-width: 380px; margin-bottom: 28px;
}
.c-stat {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-card); padding: 16px 10px; text-align: center;
}
.c-stat-val {
  font-size: 22px; font-weight: 500; letter-spacing: -0.03em; color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
}
.c-stat-lbl {
  font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-faint); font-family: 'JetBrains Mono', monospace; margin-top: 5px;
}

.complete-actions { display: flex; flex-direction: column; gap: 9px; width: 100%; max-width: 380px; }
.btn-c-primary {
  width: 100%; padding: 14px;
  border-radius: var(--r-card); border: none; cursor: pointer;
  font-size: 14.5px; font-weight: 500; font-family: inherit;
  background: var(--ink); color: #06070b;
  transition: transform .2s, box-shadow .2s;
}
.btn-c-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(240,242,246,0.1); }
.btn-c-secondary {
  width: 100%; padding: 13px;
  border-radius: var(--r-card);
  background: var(--surface); border: 1px solid var(--line-strong);
  color: var(--ink-dim); font-size: 14px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: background .15s;
}
.btn-c-secondary:hover { background: var(--surface-2); color: var(--ink); }

/* ── Weak areas pill ────────────────────────────── */
.weak-topics {
  display: flex; flex-wrap: wrap; gap: 7px; justify-content: center;
  margin-bottom: 24px; max-width: 380px;
}
.weak-pill {
  padding: 4px 12px; border-radius: var(--r-pill); font-size: 12px;
  background: rgba(255,72,88,0.08); border: 1px solid rgba(255,72,88,0.2);
  color: var(--coral);
}
.strong-pill {
  padding: 4px 12px; border-radius: var(--r-pill); font-size: 12px;
  background: rgba(110,156,199,0.08); border: 1px solid rgba(110,156,199,0.2);
  color: var(--teal);
}

/* ── Responsive ─────────────────────────────────── */
@media (max-width: 480px) {
  .session-shell { padding: 0 14px 36px; }
  .q-card { padding: 22px 18px; }
  .q-stem { font-size: 16px; }
  .a-card { padding: 13px 15px; gap: 11px; }
  .a-text { font-size: 14px; }
  .tutor-panel { padding: 22px 18px 36px; }
  .complete-stats { gap: 8px; }
  .c-stat-val { font-size: 20px; }
}
</style>
</head>
<body>

<!-- ── Atmosphere ──────────────────────────── -->
<div class="backdrop" id="backdrop"></div>
<div class="grid-lines"></div>

<!-- ── Floaters ───────────────────────────── -->
<div class="xp-floater" id="xpFloater"></div>
<div class="streak-toast" id="streakToast"></div>

<!-- ── AI Tutor ───────────────────────────── -->
<div class="tutor-scrim" id="tutorScrim" onclick="closeTutor()"></div>
<div class="tutor-panel" id="tutorPanel">
  <div class="tutor-handle"></div>
  <div class="tutor-hdr">
    <div class="tutor-avatar">✦</div>
    <div>
      <div class="tutor-name">AI Tutor</div>
      <div class="tutor-tag">AXEOUS LEARN · POWERED BY CLAUDE</div>
    </div>
    <div class="tutor-close" onclick="closeTutor()">✕</div>
  </div>
  <div id="tutorBody"></div>
</div>

<!-- ── Session complete ────────────────── -->
<div class="complete-screen" id="completeScreen">
  <div class="complete-glow"></div>
  <div class="complete-icon">✦</div>
  <div class="complete-label">SESSION COMPLETE</div>
  <div class="complete-title" id="completeTitle">Well done.</div>
  <div class="complete-sub" id="completeSub">10 questions answered</div>
  <div class="complete-stats">
    <div class="c-stat"><div class="c-stat-val" id="cAccuracy">—</div><div class="c-stat-lbl">Accuracy</div></div>
    <div class="c-stat"><div class="c-stat-val" id="cStreak">—</div><div class="c-stat-lbl">Best streak</div></div>
    <div class="c-stat"><div class="c-stat-val" id="cXP">—</div><div class="c-stat-lbl">XP earned</div></div>
  </div>
  <div class="weak-topics" id="weakTopics"></div>
  <div class="complete-actions">
    <button class="btn-c-primary" onclick="restartSession()">Start another session</button>
    <button class="btn-c-secondary" onclick="goBack()">Back to dashboard</button>
  </div>
</div>

<!-- ── Main shell ─────────────────────── -->
<div class="session-shell">

  <!-- HUD -->
  <div class="hud">
    <div class="hud-btn" onclick="exitSession()" title="Exit session">✕</div>
    <div class="hud-progress">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-meta">
        <div class="progress-label" id="qLabel">1 / 10</div>
        <div class="progress-label" id="qTopicLabel">Biology</div>
      </div>
    </div>
    <div class="hud-chips">
      <div class="hud-chip streak-chip" id="streakChip">
        <div class="chip-dot"></div>
        <span id="streakVal">0</span>
      </div>
      <div class="hud-chip" id="accuracyChip">
        <span id="accuracyVal">—</span>
      </div>
    </div>
  </div>

  <!-- Timer -->
  <div class="timer-bar-wrap">
    <div class="timer-bar-track">
      <div class="timer-bar-fill" id="timerFill" style="width:100%"></div>
    </div>
    <div class="timer-label-row">
      <div class="timer-label" id="timerLabel">1:30</div>
    </div>
  </div>

  <!-- Question zone -->
  <div class="question-zone" id="questionZone">

    <div class="topic-eyebrow">
      <div class="topic-eyebrow-dot"></div>
      <span id="topicText">Biology</span>
    </div>

    <div class="q-card" id="qCard">
      <div class="q-stem" id="qStem">Loading...</div>
    </div>

    <div class="answers" id="answersGrid"></div>

    <div class="feedback-panel" id="feedbackPanel">
      <div class="fb-header">
        <div class="fb-icon" id="fbIcon"></div>
        <div class="fb-title" id="fbTitle"></div>
        <div class="fb-xp" id="fbXp"></div>
      </div>
      <div class="fb-explanation" id="fbExplanation"></div>
      <button class="btn-ai" id="btnAiTutor" onclick="openTutor()" style="display:none">
        <span class="ai-spark">✦</span> Explain with AI Tutor
      </button>
    </div>

    <div class="continue-wrap" id="continueWrap">
      <button class="btn-continue" id="btnContinue" onclick="advance()">
        Continue <span>→</span>

    </div>

    <div class="keyboard-hint">
      Press <span class="key-badge">A</span><span class="key-badge">B</span>
      <span class="key-badge">C</span><span class="key-badge">D</span> to answer
      · <span class="key-badge">Space</span> to continue
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════════════════════
   QUESTION BANK
════════════════════════════════════════════════ */
const BANK = [
  {
    topic: 'Biology',
    stem: 'Which organelle is primarily responsible for producing ATP through oxidative phosphorylation?',
    options: ['Golgi apparatus', 'Endoplasmic reticulum', 'Mitochondria', 'Ribosome'],
    correct: 2,
    explanation: 'The mitochondria house the electron transport chain along their inner membrane, driving ATP synthesis via oxidative phosphorylation. Each glucose molecule yields ~30–32 ATP through this pathway — far more than glycolysis alone.',
    concept: 'Cellular respiration: glycolysis (cytoplasm) → Krebs cycle (matrix) → oxidative phosphorylation (inner membrane). Only the last step requires O₂.',
    tip: '"Mighty Mitochondria = Most ATP." The inner membrane\'s folds (cristae) maximise surface area for the ETC and ATP synthase.'
  },
  {
    topic: 'Biology',
    stem: 'During meiosis II, what distinguishes it from a typical mitotic division?',
    options: [
      'DNA replication occurs before division',
      'Homologous chromosomes separate',
      'Sister chromatids separate without prior DNA replication',
      'The cell doubles in size before dividing'
    ],
    correct: 2,
    explanation: 'In meiosis II, sister chromatids separate — mechanically similar to mitosis — but crucially no DNA replication (S-phase) precedes it. Cells entering meiosis II are already haploid from meiosis I.',
    concept: 'No S-phase between meiosis I and II. Meiosis II simply separates the chromatids of haploid cells — do not confuse with the reductive division of meiosis I.',
    tip: 'Meiosis II = "Mitosis of haploids." Same mechanics, no replication, already halved from meiosis I.'
  },
  {
    topic: 'General Chemistry',
    stem: 'A buffer contains 0.1 M acetic acid (pKa = 4.74) and 0.1 M sodium acetate. What is the pH?',
    options: ['4.74', '7.00', '3.74', '5.74'],
    correct: 0,
    explanation: 'Henderson-Hasselbalch: pH = pKa + log([A⁻]/[HA]). When [A⁻] = [HA], log(1) = 0, so pH = pKa = 4.74. Equal concentrations mean the buffer is at its midpoint — maximum buffering capacity.',
    concept: 'pH = pKa when [conjugate base] = [weak acid]. This is also where the buffer resists pH change most effectively.',
    tip: '"Equal concentrations → pH = pKa." The buffer is most potent within ±1 pH unit of pKa.'
  },
  {
    topic: 'Organic Chemistry',
    stem: 'Which conditions most strongly favour an SN2 mechanism over SN1?',
    options: [
      'Tertiary substrate in a polar protic solvent',
      'Primary substrate with a strong nucleophile in polar aprotic solvent',
      'Tertiary substrate with a weak nucleophile',
      'Secondary substrate in water with silver nitrate'
    ],
    correct: 1,
    explanation: 'SN2 is favoured by: (1) primary substrate — minimal steric hindrance for backside attack; (2) strong nucleophile — drives the bimolecular rate; (3) polar aprotic solvent (DMSO, acetone) — does not cage the nucleophile. All three together maximise SN2.',
    concept: 'SN2: 1° substrate + strong nuc + polar aprotic. SN1: 3° substrate + weak nuc + polar protic (forms stable carbocation).',
    tip: 'SN2 needs "room to attack." Primary carbon is least hindered. Aprotic solvents free the nucleophile. Strong nuc drives the single concerted step.'
  },
  {
    topic: 'Biology',
    stem: 'Which Krebs cycle step produces GTP via substrate-level phosphorylation?',
    options: [
      'Isocitrate → α-ketoglutarate',
      'Succinyl-CoA → Succinate',
      'Malate → Oxaloacetate',
      'Citrate → Isocitrate'
    ],
    correct: 1,
    explanation: 'Succinyl-CoA synthetase converts succinyl-CoA to succinate and couples the reaction to GTP synthesis — the only substrate-level phosphorylation in the Krebs cycle. All other ATP comes indirectly from NADH/FADH₂ via the ETC.',
    concept: 'One turn of the Krebs cycle yields: 3 NADH, 1 FADH₂, 1 GTP, 2 CO₂. GTP comes only from the succinyl-CoA step.',
    tip: '"Success Gets TP." Succinyl-CoA → Succinate = 1 GTP. Every other step captures energy as electron carriers, not ATP directly.'
  },
  {
    topic: 'General Chemistry',
    stem: 'Which quantum number determines the shape of an atomic orbital?',
    options: [
      'Principal quantum number (n)',
      'Magnetic quantum number (mₗ)',
      'Spin quantum number (mₛ)',
      'Angular momentum quantum number (ℓ)'
    ],
    correct: 3,
    explanation: 'The angular momentum quantum number (ℓ) defines shape: ℓ=0 → s (sphere), ℓ=1 → p (dumbbell), ℓ=2 → d (cloverleaf), ℓ=3 → f (complex). n determines size and energy level; mₗ determines spatial orientation; mₛ is spin.',
    concept: 'n = size/energy. ℓ = shape (0→s,1→p,2→d,3→f). mₗ = orientation. mₛ = spin (±½). All four quantum numbers together uniquely describe an electron.',
    tip: '"ℓ = letter of orbital." s, p, d, f match ℓ = 0, 1, 2, 3. n gives the shell, ℓ gives the sublevel shape.'
  },
  {
    topic: 'Biology',
    stem: 'Which enzyme removes RNA primers and fills in the resulting gaps during DNA replication?',
    options: ['DNA polymerase III', 'DNA polymerase I', 'DNA ligase', 'Primase'],
    correct: 1,
    explanation: 'DNA polymerase I uses its 5′→3′ exonuclease activity to excise RNA primers, then fills the gap with deoxyribonucleotides using its 5′→3′ polymerase activity. DNA ligase then seals the remaining nick between fragments.',
    concept: 'Pol III: main synthesis. Pol I: primer removal + gap fill. Ligase: seals nicks. Primase: makes RNA primers. Helicase: unwinds double helix.',
    tip: 'Think assembly line: Pol III builds, Pol I cleans (remove primer, fill gap), Ligase glues. "Pol I = Primer cleaner."'
  },
  {
    topic: 'Organic Chemistry',
    stem: 'A chiral centre is best defined as:',
    options: [
      'A carbon bonded to two identical and two different substituents',
      'A carbon bonded to four different substituents',
      'Any carbon atom in an aromatic ring',
      'A carbon bearing at least one hydrogen'
    ],
    correct: 1,
    explanation: 'A chiral centre (stereocenter) is an sp³ carbon with four distinct substituents, creating non-superimposable mirror images (enantiomers). Any two identical substituents eliminate chirality because the mirror images become superimposable.',
    concept: '4 different groups → chiral → non-superimposable mirror images (enantiomers) → optical activity. Any repeat → achiral.',
    tip: 'Think of your hands: mirror images, not identical. Chiral carbons work the same — 4 different "fingers." If any two match, the chirality vanishes.'
  },
  {
    topic: 'Biology',
    stem: 'What is the primary driving force for water movement across a semi-permeable membrane (osmosis)?',
    options: [
      'Hydrostatic pressure gradient',
      'Concentration gradient of solute particles',
      'Water potential gradient (osmotic pressure difference)',
      'Active transport of water molecules'
    ],
    correct: 2,
    explanation: 'Osmosis is driven by differences in water potential (Ψ). Water moves passively from high Ψ (low solute) to low Ψ (high solute). Water is never actively transported — aquaporins facilitate, but do not drive, movement.',
    concept: 'Water potential Ψ = Ψₛ + Ψₚ. Lower solute concentration = higher Ψ = water flows out toward higher solute. Osmosis is always passive.',
    tip: '"Water follows salt." High solute = low water potential = water is drawn there. Osmosis never needs ATP — it\'s thermodynamically spontaneous.'
  },
  {
    topic: 'General Chemistry',
    stem: 'For an endothermic reaction at equilibrium, what happens to Keq when temperature increases?',
    options: [
      'Keq decreases, shifting equilibrium toward reactants',
      'Keq increases, shifting equilibrium toward products',
      'Keq remains unchanged',
      'Keq becomes zero'
    ],
    correct: 1,
    explanation: 'For endothermic reactions (ΔH > 0), treating heat as a reactant, adding heat (raising T) shifts equilibrium toward products, raising Keq. This is consistent with both Le Chatelier\'s principle and the van\'t Hoff equation: d(lnK)/dT = ΔH°/RT².',
    concept: 'Endothermic (ΔH > 0): ↑T → ↑Keq (products favoured). Exothermic (ΔH < 0): ↑T → ↓Keq (reactants favoured). Temperature changes Keq itself, unlike pressure/concentration.',
    tip: 'For endothermic: treat heat as a reactant. "Adding a reactant shifts right." So ↑T → Keq increases. Opposite for exothermic reactions.'
  }
];

/* ════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════ */
const S = {
  questions: [],
  idx: 0,
  answered: false,
  selectedDisplay: null,
  optMap: [],      // optMap[displayIdx] = { text, origIdx }
  correct: 0,
  streak: 0,
  bestStreak: 0,
  xp: 0,
  timeLeft: 90,
  totalSec: 90,
  timerInterval: null,
  wrongTopics: new Set(),
  rightTopics: new Set(),
};

/* ════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════ */
function boot() {
  S.questions = shuffle([...BANK]);
  S.idx = 0;
  S.answered = false;
  S.correct = 0;
  S.streak = 0;
  S.bestStreak = 0;
  S.xp = 0;
  S.wrongTopics.clear();
  S.rightTopics.clear();
  render();
  tick();
}

/* ════════════════════════════════════════════════
   RENDER QUESTION
════════════════════════════════════════════════ */
function render() {
  const q  = S.questions[S.idx];
  const n  = S.questions.length;

  // Progress
  const pct = (S.idx / n) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qLabel').textContent = `${S.idx + 1} / ${n}`;
  document.getElementById('qTopicLabel').textContent = q.topic;
  document.getElementById('topicText').textContent = q.topic;

  // Question card re-animate
  const card = document.getElementById('qCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
  document.getElementById('qStem').textContent = q.stem;

  // Shuffle answers
  S.optMap = shuffle(q.options.map((t, i) => ({ text: t, origIdx: i })));
  const LETTERS = ['A','B','C','D'];
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  S.optMap.forEach((opt, di) => {
    const el = document.createElement('div');
    el.className = 'a-card';
    el.dataset.di = di;
    el.innerHTML = `
      <div class="a-letter">${LETTERS[di]}</div>
      <div class="a-text">${opt.text}</div>
      <div class="a-icon" id="ai-${di}"></div>
    `;
    el.addEventListener('click', () => pick(di));
    el.addEventListener('touchstart', () => {}, { passive: true });
    grid.appendChild(el);
  });

  // Reset UI
  const fp = document.getElementById('feedbackPanel');
  fp.className = 'feedback-panel';
  fp.style.display = 'flex';
  document.getElementById('continueWrap').classList.remove('visible');
  document.getElementById('btnAiTutor').style.display = 'none';
  document.getElementById('backdrop').className = 'backdrop';

  S.answered = false;
  S.selectedDisplay = null;

  // Reset + restart timer
  restartTimer();
  updateHUD();
}

/* ════════════════════════════════════════════════
   PICK ANSWER
════════════════════════════════════════════════ */
function pick(di) {
  if (S.answered) return;
  S.answered = true;
  S.selectedDisplay = di;

  stopTimer();

  const q       = S.questions[S.idx];
  const correct = S.optMap[di].origIdx === q.correct;
  const cards   = document.querySelectorAll('.a-card');

  // Reveal states
  cards.forEach((c, i) => {
    c.classList.add('locked');
    const isRight = S.optMap[i].origIdx === q.correct;
    if (i === di) {
      c.classList.add(correct ? 'correct' : 'incorrect');
      document.getElementById(`ai-${i}`).textContent = correct ? '✓' : '✗';
    } else {
      if (!isRight) {
        c.classList.add('dimmed');
      } else if (!correct) {
        // Reveal true answer after brief delay
        setTimeout(() => {
          c.classList.add('correct');
          document.getElementById(`ai-${i}`).textContent = '✓';
        }, 320);
      }
    }
  });

  // Scoring
  let xpGained = 0;
  if (correct) {
    S.correct++;
    S.streak++;
    S.bestStreak = Math.max(S.bestStreak, S.streak);
    xpGained = 10 + (S.streak >= 3 ? 5 : 0) + (S.timeLeft > 60 ? 5 : S.timeLeft > 30 ? 2 : 0);
    S.xp += xpGained;
    S.rightTopics.add(q.topic);
    if (S.streak > 0 && S.streak % 3 === 0) flashStreak(S.streak);
    flashXP(`+${xpGained} XP`);
  } else {
    S.streak = 0;
    S.wrongTopics.add(q.topic);
  }

  updateHUD();
  showFeedback(correct, q, xpGained);
  document.getElementById('backdrop').className = 'backdrop ' + (correct ? 'state-correct' : 'state-incorrect');
}

/* ════════════════════════════════════════════════
   FEEDBACK
════════════════════════════════════════════════ */
const CORRECT_MSGS = ['Correct.', 'Exactly right.', 'Well done.', 'Spot on.', 'That\'s it.'];
const INCORRECT_MSGS = ['Not quite.', 'Close, but not right.', 'Almost — keep going.'];

function showFeedback(isCorrect, q, xpGained) {
  const panel = document.getElementById('feedbackPanel');
  const icon  = document.getElementById('fbIcon');
  const title = document.getElementById('fbTitle');
  const xpEl  = document.getElementById('fbXp');
  const expl  = document.getElementById('fbExplanation');
  const btnAI = document.getElementById('btnAiTutor');
  const cont  = document.getElementById('continueWrap');
  const btn   = document.getElementById('btnContinue');

  if (isCorrect) {
    icon.className  = 'fb-icon correct';
    icon.textContent = '✓';
    title.className  = 'fb-title correct';
    title.textContent = rand(CORRECT_MSGS);
    xpEl.textContent  = `+${xpGained} XP`;
    xpEl.style.display = '';
    expl.textContent  = q.explanation;
    panel.classList.add('correct-panel');
    btn.className   = 'btn-continue is-correct';
    btnAI.style.display = 'none';
  } else {
    icon.className  = 'fb-icon incorrect';
    icon.textContent = '✗';
    title.className  = 'fb-title incorrect';
    title.textContent = rand(INCORRECT_MSGS);
    xpEl.style.display = 'none';
    const correctOpt = S.optMap.find(o => o.origIdx === q.correct);
    expl.innerHTML = `${q.explanation}
      <div class="fb-correct-answer">
        <span class="fb-correct-label">Correct</span>
        ${correctOpt.text}
      </div>`;
    panel.classList.add('incorrect-panel');
    btn.className   = 'btn-continue is-incorrect';
    btnAI.style.display = 'flex';
  }

  setTimeout(() => {
    panel.classList.add('visible');
    cont.classList.add('visible');
  }, isCorrect ? 180 : 450);
}

/* ════════════════════════════════════════════════
   ADVANCE
════════════════════════════════════════════════ */
function advance() {
  S.idx++;
  document.getElementById('backdrop').className = 'backdrop';
  if (S.idx >= S.questions.length) { finishSession(); return; }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(render, 60);
}

/* ════════════════════════════════════════════════
   TIMEOUT
════════════════════════════════════════════════ */
function timeout() {
  if (S.answered) return;
  S.answered = true;
  S.streak = 0;
  updateHUD();

  const q     = S.questions[S.idx];
  const cards = document.querySelectorAll('.a-card');
  cards.forEach((c, i) => {
    c.classList.add('locked');
    if (S.optMap[i].origIdx === q.correct) {
      c.classList.add('correct');
      document.getElementById(`ai-${i}`).textContent = '✓';
    } else {
      c.classList.add('dimmed');
    }
  });

  S.wrongTopics.add(q.topic);

  const panel = document.getElementById('feedbackPanel');
  document.getElementById('fbIcon').className  = 'fb-icon incorrect';
  document.getElementById('fbIcon').textContent = '⏱';
  document.getElementById('fbTitle').className  = 'fb-title incorrect';
  document.getElementById('fbTitle').textContent = 'Time\'s up.';
  document.getElementById('fbXp').style.display = 'none';
  document.getElementById('fbExplanation').textContent = q.explanation;
  panel.classList.add('incorrect-panel');
  document.getElementById('btnContinue').className = 'btn-continue is-incorrect';
  document.getElementById('btnAiTutor').style.display = 'flex';

  document.getElementById('backdrop').className = 'backdrop state-incorrect';

  setTimeout(() => {
    panel.classList.add('visible');
    document.getElementById('continueWrap').classList.add('visible');
  }, 300);
}

/* ════════════════════════════════════════════════
   TIMER
════════════════════════════════════════════════ */
function tick() {
  S.timerInterval = setInterval(() => {
    S.timeLeft--;
    renderTimer();
    if (S.timeLeft <= 0) { stopTimer(); timeout(); }
  }, 1000);
}

function restartTimer() {
  stopTimer();
  S.timeLeft = S.totalSec;
  renderTimer();
  tick();
}

function stopTimer() {
  clearInterval(S.timerInterval);
  S.timerInterval = null;
}

function renderTimer() {
  const pct   = (S.timeLeft / S.totalSec) * 100;
  const warn  = S.timeLeft <= 15;
  const fill  = document.getElementById('timerFill');
  const label = document.getElementById('timerLabel');
  fill.style.width = pct + '%';
  fill.className   = 'timer-bar-fill' + (warn ? ' warn' : '');
  const m = Math.floor(S.timeLeft / 60);
  const s = S.timeLeft % 60;
  label.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  label.className   = 'timer-label' + (warn ? ' warn' : '');
}

/* ════════════════════════════════════════════════
   HUD
════════════════════════════════════════════════ */
function updateHUD() {
  document.getElementById('streakVal').textContent = S.streak;
  const done = S.idx + (S.answered ? 1 : 0);
  if (done > 0) {
    document.getElementById('accuracyVal').textContent =
      Math.round((S.correct / done) * 100) + '%';
  }
}

/* ════════════════════════════════════════════════
   XP FLOATER
════════════════════════════════════════════════ */
function flashXP(text) {
  const el = document.getElementById('xpFloater');
  el.textContent = text;
  el.classList.remove('pop');
  el.offsetHeight;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 1150);
}

/* ════════════════════════════════════════════════
   STREAK TOAST
════════════════════════════════════════════════ */
function flashStreak(n) {
  const el = document.getElementById('streakToast');
  el.textContent = `✦  ${n} in a row`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ════════════════════════════════════════════════
   AI TUTOR
════════════════════════════════════════════════ */
function openTutor() {
  const q = S.questions[S.idx];
  document.getElementById('tutorBody').innerHTML = `
    <div class="tutor-section">
      <div class="tutor-section-lbl">Why this answer is wrong</div>
      <div class="tutor-section-body">${q.explanation}</div>
    </div>
    <div class="tutor-section">
      <div class="tutor-section-lbl">Key concept</div>
      <div class="tutor-section-body">${q.concept}</div>
    </div>
    <div class="tutor-section">
      <div class="tutor-section-lbl">Memory tip</div>
      <div class="tutor-tip">${q.tip}</div>
    </div>
  `;
  document.getElementById('tutorScrim').classList.add('open');
  document.getElementById('tutorPanel').classList.add('open');
  document.body.classList.add('locked');
}

function closeTutor() {
  document.getElementById('tutorScrim').classList.remove('open');
  document.getElementById('tutorPanel').classList.remove('open');
  document.body.classList.remove('locked');
}

/* ════════════════════════════════════════════════
   SESSION COMPLETE
════════════════════════════════════════════════ */
function finishSession() {
  stopTimer();

  const n   = S.questions.length;
  const acc = Math.round((S.correct / n) * 100);

  document.getElementById('cAccuracy').textContent = acc + '%';
  document.getElementById('cStreak').textContent   = S.bestStreak;
  document.getElementById('cXP').textContent       = S.xp;

  const titles = acc >= 85 ? 'Excellent session.' : acc >= 65 ? 'Good effort.' : 'Keep at it.';
  document.getElementById('completeTitle').textContent = titles;
  document.getElementById('completeSub').textContent =
    `${S.correct} of ${n} correct · ${S.xp} XP earned`;

  const weakEl = document.getElementById('weakTopics');
  weakEl.innerHTML = '';
  S.wrongTopics.forEach(t => {
    const p = document.createElement('div');
    p.className = 'weak-pill'; p.textContent = `Review: ${t}`;
    weakEl.appendChild(p);
  });
  S.rightTopics.forEach(t => {
    if (!S.wrongTopics.has(t)) {
      const p = document.createElement('div');
      p.className = 'strong-pill'; p.textContent = `Strong: ${t}`;
      weakEl.appendChild(p);
    }
  });

  setTimeout(() => {
    document.getElementById('completeScreen').classList.add('visible');
  }, 300);
}

function restartSession() {
  document.getElementById('completeScreen').classList.remove('visible');
  setTimeout(boot, 400);
}

function goBack() {
  window.history.back();
}

function exitSession() {
  if (!S.answered && S.idx === 0) { goBack(); return; }
  if (confirm('Leave this session? Your current progress will be lost.')) {
    stopTimer(); goBack();
  }
}

/* ════════════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (document.getElementById('tutorPanel').classList.contains('open')) {
    if (e.key === 'Escape') closeTutor();
    return;
  }
  const map = { a: 0, b: 1, c: 2, d: 3, '1': 0, '2': 1, '3': 2, '4': 3 };
  if (e.key.toLowerCase() in map && !S.answered) {
    const di = map[e.key.toLowerCase()];
    if (di < S.optMap.length) pick(di);
  }
  if ((e.key === ' ' || e.key === 'Enter') && S.answered) {
    e.preventDefault();
    advance();
  }
  if (e.key === 'Escape') exitSession();
});

/* ════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════ */
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ════════════════════════════════════════════════
   START
════════════════════════════════════════════════ */
boot();
</script>
